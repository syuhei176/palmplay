<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Body Kendo — 全身で斬るwebカメラ剣道（ボス戦）</title>
  <style>
    :root {
      --bg: #0c0a12;
      --accent: #ffce54;
      --blade: #eafcff;
      --danger: #ff4d6d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: radial-gradient(circle at 50% 0%, #241a2e 0%, var(--bg) 70%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* video は検出用。画面には canvas を表示する */
    #cam { display: none; }
    #game {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* HUD */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px 24px;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }
    #score { font-size: 34px; font-weight: 800; text-shadow: 0 2px 12px rgba(0,0,0,.6); }
    #score small { font-size: 14px; font-weight: 600; opacity: .7; display: block; letter-spacing: .15em; }
    #lives { font-size: 30px; letter-spacing: 4px; text-shadow: 0 2px 12px rgba(0,0,0,.6); }
    #cue {
      position: absolute;
      top: 76px; left: 50%;
      transform: translateX(-50%);
      font-size: 20px; font-weight: 800; letter-spacing: .12em;
      padding: 6px 18px; border-radius: 999px;
      background: rgba(0,0,0,.35);
      text-shadow: 0 2px 12px rgba(0,0,0,.6);
      white-space: nowrap;
      transition: color .15s, background .15s;
    }
    #cue.strike { color: #1a1208; background: var(--accent); }
    #cue.guard { color: #cfe6ff; background: rgba(70,120,200,.4); }
    #kiai {
      position: absolute;
      top: 120px; left: 50%;
      transform: translateX(-50%) scale(.6);
      font-size: 60px; font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 22px rgba(255,206,84,.8);
      opacity: 0;
      transition: opacity .12s, transform .12s;
    }

    /* オーバーレイ（スタート/ゲームオーバー/読込） */
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px;
      background: rgba(10,8,16,.84);
      backdrop-filter: blur(6px);
      text-align: center;
      padding: 24px;
    }
    #overlay.hidden { display: none; }
    #overlay h1 {
      font-size: clamp(40px, 8vw, 84px);
      font-weight: 900;
      letter-spacing: .04em;
      background: linear-gradient(120deg, var(--accent), #ff8b46);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #overlay h1.clear { background: linear-gradient(120deg, #7af7c0, #43e97b); -webkit-background-clip: text; background-clip: text; }
    #overlay p { font-size: 17px; line-height: 1.8; opacity: .88; max-width: 460px; }
    #overlay .big { font-size: 64px; font-weight: 900; }
    .setup {
      font-size: 13.5px; line-height: 1.7; opacity: .7; max-width: 460px;
      border: 1px solid rgba(255,255,255,.14); border-radius: 14px; padding: 14px 18px;
      background: rgba(255,255,255,.04);
    }
    .setup b { color: var(--accent); font-weight: 700; }
    .btn {
      pointer-events: auto;
      cursor: pointer;
      border: none;
      font: inherit;
      font-weight: 800;
      font-size: 22px;
      color: #1a1208;
      background: linear-gradient(120deg, var(--accent), #ff8b46);
      padding: 16px 44px;
      border-radius: 999px;
      box-shadow: 0 8px 30px rgba(255,206,84,.35);
      transition: transform .12s, box-shadow .12s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 38px rgba(255,206,84,.5); }
    .btn:active { transform: translateY(0); }
    .spinner {
      width: 46px; height: 46px;
      border: 4px solid rgba(255,255,255,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #err { color: var(--danger); font-size: 15px; max-width: 460px; line-height: 1.7; }
    .hint { font-size: 13px; opacity: .55; letter-spacing: .04em; }
  </style>
</head>
<body>
  <div id="stage">
    <video id="cam" playsinline autoplay muted></video>
    <canvas id="game"></canvas>

    <div id="hud">
      <div id="score">0<small>SCORE</small></div>
      <div id="lives">❤️❤️❤️</div>
    </div>
    <div id="cue"></div>
    <div id="kiai"></div>

    <div id="overlay">
      <h1>BODY&nbsp;KENDO</h1>
      <p>全身を映し、両手の<strong>竹刀</strong>で<strong>鬼の大将</strong>と一騎打ち。隙を突いて斬りつけ、<strong>HPを削り切れば討ち取りクリア</strong>。放たれる<strong>鬼火</strong>は斬って防げ。</p>
      <div class="setup">
        <b>セットアップ：</b>カメラから <b>2.5〜3m</b> 離れ、足元から振りかぶりまで全身が映る位置へ。カメラは<b>腰〜胸の高さ</b>に。明るい正面光で、背後に窓を置かないのがコツ。
      </div>
      <button class="btn" id="startBtn">いざ勝負</button>
      <div class="hint">※ カメラの使用許可を求められたら「許可」を選んでください</div>
      <div id="err"></div>
    </div>
  </div>

  <script type="module">
    import {
      PoseLandmarker,
      FilesetResolver,
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12";

    const video = document.getElementById("cam");
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const errEl = document.getElementById("err");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const cueEl = document.getElementById("cue");
    const kiaiEl = document.getElementById("kiai");

    // ---- 調整パラメータ ----
    const SWING_MIN = 16;        // この速さ(px/frame)以上で振らないと斬れない
    const BOSS_MAX_HP = 100;     // 鬼の大将のHP
    const BOSS_DMG = 7;          // 1太刀のダメージ
    const BOSS_HIT_CD = 0.28;    // ボスへの連続ヒット間隔(秒)
    const HAZARD_HIT_CD = 0.2;   // 鬼火の連続ヒット間隔(秒)
    const DANGER_RATIO = 0.84;   // この高さに鬼火が到達されると被弾
    const DIE_FADE = 0.3;

    let poseLandmarker = null;
    let state = "idle"; // idle | playing | over | clear
    let boss = null;
    let hazards = [];
    let particles = [];
    let slashFx = [];
    const tipTrail = [];
    let sword = null;
    let prevTip = null;
    let lastLandmarks = null;
    let score = 0;
    let lives = 3;
    let combo = 0;
    let comboTimer = 0;
    let elapsed = 0;
    let lastTime = 0;
    let lastVideoTime = -1;
    let flashAlpha = 0;

    // ---- モデル読み込み ----
    async function loadModel() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm"
      );
      poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
          delegate: "GPU",
        },
        runningMode: "VIDEO",
        numPoses: 1,
      });
    }

    // ---- カメラ起動 ----
    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();
      canvas.width = video.videoWidth || 1280;
      canvas.height = video.videoHeight || 720;
    }

    // ---- スタート ----
    startBtn.addEventListener("click", async () => {
      errEl.textContent = "";
      overlay.innerHTML = '<div class="spinner"></div><p>カメラとAIモデルを準備中…</p>';
      try {
        await startCamera();
        if (!poseLandmarker) await loadModel();
        resetGame();
        overlay.classList.add("hidden");
        state = "playing";
        lastTime = performance.now();
        requestAnimationFrame(loop);
      } catch (e) {
        console.error(e);
        showError(e);
      }
    });

    function showError(e) {
      overlay.classList.remove("hidden");
      const msg =
        e?.name === "NotAllowedError"
          ? "カメラの使用が許可されませんでした。ブラウザのアドレスバーのカメラ設定から許可してください。"
          : "起動に失敗しました（" + (e?.message || e) + "）。https もしくは localhost で開いているか確認してください。";
      overlay.innerHTML =
        '<h1>BODY&nbsp;KENDO</h1><div id="err"></div><button class="btn" id="startBtn2">もう一度</button>';
      overlay.querySelector("#err").textContent = msg;
      overlay.querySelector("#startBtn2").addEventListener("click", () => location.reload());
    }

    function resetGame() {
      hazards = [];
      particles = [];
      slashFx = [];
      tipTrail.length = 0;
      sword = null;
      prevTip = null;
      score = 0;
      lives = 3;
      combo = 0;
      comboTimer = 0;
      elapsed = 0;
      flashAlpha = 0;
      boss = {
        x: canvas.width * 0.5,
        y: -canvas.height * 0.2,
        hp: BOSS_MAX_HP,
        maxHp: BOSS_MAX_HP,
        emoji: "👹",
        st: "intro", // intro | vulnerable | attack
        stT: 1.2,
        phase: 0,
        bob: 0,
        hitCd: 0,
        hitFlash: 0,
        spawnT: 0,
        spawnGap: 0.8,
        toSpawn: 0,
      };
      updateHud();
      setCue("rdy");
    }

    function updateHud() {
      scoreEl.innerHTML = score + "<small>SCORE</small>";
      livesEl.textContent = "❤️".repeat(Math.max(0, lives)) + "🖤".repeat(Math.max(0, 3 - lives));
    }

    function setCue(kind) {
      cueEl.classList.remove("strike", "guard");
      if (kind === "strike") { cueEl.textContent = "▼ 今だ！斬れ！"; cueEl.classList.add("strike"); }
      else if (kind === "guard") { cueEl.textContent = "▲ 防御！鬼火を斬れ"; cueEl.classList.add("guard"); }
      else cueEl.textContent = "いざ尋常に";
    }

    // ---- ボスの状態遷移 ----
    function enterVulnerable() {
      boss.st = "vulnerable";
      boss.stT = Math.max(2.0, 3.4 - boss.phase * 0.2);
      setCue("strike");
    }
    function enterAttack() {
      boss.st = "attack";
      boss.phase++;
      boss.toSpawn = Math.min(8, 3 + boss.phase);
      boss.spawnGap = Math.max(0.42, 0.9 - boss.phase * 0.06);
      boss.spawnT = 0.3;
      setCue("guard");
    }

    function updateBoss(dt) {
      const b = boss;
      b.bob += dt * 2.4;
      b.x = canvas.width * 0.5 + Math.sin(b.bob * 0.55) * canvas.width * 0.13;
      if (b.hitCd > 0) b.hitCd -= dt;
      if (b.hitFlash > 0) b.hitFlash -= dt;
      b.stT -= dt;
      const vulY = canvas.height * 0.46;
      const retY = canvas.height * 0.17;
      const k = 1 - Math.pow(0.0025, dt); // フレーム非依存の追従

      if (b.st === "intro") {
        b.y += (vulY - b.y) * k;
        if (b.stT <= 0) enterVulnerable();
      } else if (b.st === "vulnerable") {
        b.y += (vulY - b.y) * k;
        if (b.stT <= 0) enterAttack();
      } else if (b.st === "attack") {
        b.y += (retY - b.y) * k;
        b.spawnT -= dt;
        if (b.spawnT <= 0 && b.toSpawn > 0) {
          spawnHazard();
          b.toSpawn--;
          b.spawnT = b.spawnGap;
        }
        if (b.toSpawn <= 0 && hazards.length === 0) enterVulnerable();
      }
    }

    // ---- 鬼火の生成（ボスから放たれ落ちてくる）----
    const HAZARD_EMOJI = ["🔥", "👻", "💢"];
    function spawnHazard() {
      const speed = 120 + boss.phase * 14 + Math.random() * 60;
      hazards.push({
        x: boss.x + (Math.random() - 0.5) * canvas.width * 0.3,
        y: boss.y + canvas.height * 0.08,
        vx: (Math.random() - 0.5) * 60,
        vy: Math.min(300, speed),
        phase: Math.random() * Math.PI * 2,
        emoji: HAZARD_EMOJI[(Math.random() * HAZARD_EMOJI.length) | 0],
        hitCd: 0,
        hitFlash: 0,
        dying: false,
        dieAge: 0,
      });
    }

    // ---- パーティクル ----
    function burst(x, y, color, n = 16) {
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 120 + Math.random() * 340;
        particles.push({
          x, y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s - 120,
          life: 0.5 + Math.random() * 0.4,
          age: 0,
          color,
          size: 4 + Math.random() * 8,
        });
      }
    }

    // ---- 点と線分の距離（斬撃判定）----
    function segDist(px, py, ax, ay, bx, by) {
      const dx = bx - ax, dy = by - ay;
      const len2 = dx * dx + dy * dy;
      let t = len2 ? ((px - ax) * dx + (py - ay) * dy) / len2 : 0;
      t = Math.max(0, Math.min(1, t));
      const cx = ax + t * dx, cy = ay + t * dy;
      return Math.hypot(px - cx, py - cy);
    }

    // ---- ボスに斬りつけ ----
    function hitBoss(vx, vy) {
      boss.hitCd = BOSS_HIT_CD;
      boss.hitFlash = 0.18;
      combo++;
      comboTimer = 1.4;
      boss.hp = Math.max(0, boss.hp - BOSS_DMG);
      score += BOSS_DMG;
      burst(boss.x, boss.y, "#ffd166", 18);
      addSlashFx(boss.x, boss.y, vx, vy);
      showKiai(vx, vy);
      updateHud();
      if (boss.hp <= 0) victory();
    }

    // ---- 鬼火を斬る ----
    function cutHazard(h, vx, vy) {
      h.hitCd = HAZARD_HIT_CD;
      h.dying = true;
      h.dieAge = 0;
      combo++;
      comboTimer = 1.4;
      score += 5;
      burst(h.x, h.y, "#eafcff", 12);
      addSlashFx(h.x, h.y, vx, vy);
      updateHud();
    }

    // 斬った向きから技名を出す（面 / 胴 / 小手）
    function showKiai(vx, vy) {
      let name;
      if (vy > Math.abs(vx) * 0.6 && vy > 0) name = "面！";
      else if (Math.abs(vx) > Math.abs(vy)) name = "胴！";
      else name = "小手！";
      const label = combo >= 3 ? name + " " + combo + "連" : name;
      kiaiEl.textContent = label;
      kiaiEl.style.opacity = "1";
      kiaiEl.style.transform = "translateX(-50%) scale(1)";
      clearTimeout(showKiai._t);
      showKiai._t = setTimeout(() => {
        kiaiEl.style.opacity = "0";
        kiaiEl.style.transform = "translateX(-50%) scale(.6)";
      }, 650);
    }

    function addSlashFx(x, y, vx, vy) {
      const len = Math.hypot(vx, vy) || 1;
      const ux = vx / len, uy = vy / len;
      const L = 90;
      slashFx.push({ x1: x - ux * L, y1: y - uy * L, x2: x + ux * L, y2: y + uy * L, age: 0, life: 0.22 });
    }

    function takeDamage(h) {
      lives--;
      combo = 0;
      flashAlpha = 0.6;
      burst(h.x, h.y, "#ff4d6d", 18);
      updateHud();
      if (lives <= 0) gameOver();
    }

    function victory() {
      state = "clear";
      const hpBonus = lives * 50;
      score += hpBonus;
      overlay.classList.remove("hidden");
      overlay.innerHTML =
        '<h1 class="clear">討ち取ったり！</h1>' +
        "<p>鬼の大将を撃破！　残ライフ " + lives + " ×50 ＝ +" + hpBonus + "</p>" +
        '<div class="big">' + score + "</div>" +
        "<p>討伐タイム " + elapsed.toFixed(1) + " 秒</p>" +
        '<button class="btn" id="again">もう一番</button>';
      overlay.querySelector("#again").addEventListener("click", restart);
    }

    function gameOver() {
      state = "over";
      const left = Math.ceil(boss.hp);
      overlay.classList.remove("hidden");
      overlay.innerHTML =
        "<h1>討ち死に</h1><p>あと一歩…　鬼の残りHP " + left + "</p>" +
        '<div class="big">' + score + '</div><button class="btn" id="again">もう一番</button>';
      overlay.querySelector("#again").addEventListener("click", restart);
    }

    function restart() {
      resetGame();
      overlay.classList.add("hidden");
      state = "playing";
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    // ---- 姿勢検出 → 竹刀を組み立てる（画面はミラー表示）----
    const POSE_CONNECTIONS = [
      [11, 12], [11, 13], [13, 15], [12, 14], [14, 16],
      [11, 23], [12, 24], [23, 24],
      [23, 25], [25, 27], [24, 26], [26, 28],
    ];

    function detectPose(nowMs) {
      if (video.currentTime === lastVideoTime) return lastLandmarks;
      lastVideoTime = video.currentTime;
      const res = poseLandmarker.detectForVideo(video, nowMs);
      lastLandmarks = res?.landmarks?.[0] || null;
      return lastLandmarks;
    }

    // ランドマーク → 鏡像のピクセル座標
    function pt(lm, i) {
      const p = lm[i];
      return { x: canvas.width - p.x * canvas.width, y: p.y * canvas.height, v: p.visibility ?? 1 };
    }
    const mid = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });

    function buildSword(lm) {
      if (!lm) return null;
      const sl = pt(lm, 11), sr = pt(lm, 12);
      const el = pt(lm, 13), er = pt(lm, 14);
      const wl = pt(lm, 15), wr = pt(lm, 16);
      if (sl.v < 0.3 || sr.v < 0.3) return null;
      if (wl.v < 0.3 && wr.v < 0.3) return null;

      const grip = mid(wl, wr);
      const elbowMid = mid(el, er);
      const shoulderMid = mid(sl, sr);
      const shoulderW = Math.hypot(sl.x - sr.x, sl.y - sr.y);

      // 竹刀の向き：前腕（肘→手首）方向。近すぎる時は肩→手首で代替
      let dx = grip.x - elbowMid.x, dy = grip.y - elbowMid.y;
      if (Math.hypot(dx, dy) < shoulderW * 0.25) {
        dx = grip.x - shoulderMid.x;
        dy = grip.y - shoulderMid.y;
      }
      const dlen = Math.hypot(dx, dy) || 1;
      const ux = dx / dlen, uy = dy / dlen;
      const bladeLen = Math.max(140, Math.min(canvas.height * 0.6, shoulderW * 2.5));

      return {
        grip,
        tip: { x: grip.x + ux * bladeLen, y: grip.y + uy * bladeLen },
        handle: { x: grip.x - ux * shoulderW * 0.55, y: grip.y - uy * shoulderW * 0.55 },
      };
    }

    // ---- メインループ ----
    function loop(now) {
      if (state !== "playing") return;
      const dt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;
      elapsed += dt;

      // 1) 姿勢検出 → 竹刀
      const lm = detectPose(now);
      sword = buildSword(lm);

      // 竹刀の先端の速度と軌跡
      let tipVx = 0, tipVy = 0, tipSpeed = 0;
      if (sword) {
        if (prevTip) { tipVx = sword.tip.x - prevTip.x; tipVy = sword.tip.y - prevTip.y; }
        tipSpeed = Math.hypot(tipVx, tipVy);
        prevTip = { x: sword.tip.x, y: sword.tip.y };
        tipTrail.push({ x: sword.tip.x, y: sword.tip.y, t: now });
      } else {
        prevTip = null;
      }
      while (tipTrail.length && now - tipTrail[0].t > 170) tipTrail.shift();

      // 2) ボス更新
      updateBoss(dt);

      // 3) 鬼火の更新
      const dangerY = canvas.height * DANGER_RATIO;
      for (const h of hazards) {
        if (h.dying) { h.dieAge += dt; continue; }
        h.phase += dt * 3;
        h.x += (h.vx + Math.sin(h.phase) * 22) * dt;
        h.y += h.vy * dt;
        if (h.hitCd > 0) h.hitCd -= dt;
        if (h.hitFlash > 0) h.hitFlash -= dt;
        if (h.y >= dangerY) { takeDamage(h); h.dying = true; h.dieAge = DIE_FADE; }
      }

      // 4) 斬撃判定（竹刀の刃 grip→tip）
      if (sword && tipSpeed >= SWING_MIN) {
        // ボス（隙のときだけ斬れる）
        if (boss.st === "vulnerable" && boss.hitCd <= 0) {
          const r = canvas.height * 0.13;
          if (segDist(boss.x, boss.y, sword.grip.x, sword.grip.y, sword.tip.x, sword.tip.y) < r) {
            hitBoss(tipVx, tipVy);
          }
        }
        // 鬼火
        for (const h of hazards) {
          if (h.dying || h.hitCd > 0) continue;
          const r = canvas.height * 0.07;
          if (segDist(h.x, h.y, sword.grip.x, sword.grip.y, sword.tip.x, sword.tip.y) < r) {
            cutHazard(h, tipVx, tipVy);
          }
        }
      }
      hazards = hazards.filter((h) => !(h.dying && h.dieAge >= DIE_FADE) && h.y < canvas.height + 120);

      // 5) パーティクル / 斬撃エフェクト更新
      for (const p of particles) {
        p.age += dt;
        p.vy += 900 * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
      }
      particles = particles.filter((p) => p.age < p.life);
      for (const fx of slashFx) fx.age += dt;
      slashFx = slashFx.filter((fx) => fx.age < fx.life);

      // コンボ減衰 / フラッシュ減衰
      if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }
      if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - dt * 1.5);

      render(lm);
      requestAnimationFrame(loop);
    }

    // ---- 描画 ----
    function render(lm) {
      // 背景にミラーしたカメラ映像
      ctx.save();
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();
      // 夕闇のベール
      ctx.fillStyle = "rgba(12,8,18,0.4)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 危険ライン
      const dangerY = canvas.height * DANGER_RATIO;
      ctx.save();
      ctx.strokeStyle = "rgba(255,77,109,0.5)";
      ctx.lineWidth = 3;
      ctx.setLineDash([18, 14]);
      ctx.beginPath();
      ctx.moveTo(0, dangerY);
      ctx.lineTo(canvas.width, dangerY);
      ctx.stroke();
      ctx.restore();

      drawBoss();
      drawHazards(dangerY);

      // パーティクル
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, 1 - p.age / p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // 斬撃エフェクト（一閃）
      for (const fx of slashFx) {
        const a = Math.max(0, 1 - fx.age / fx.life);
        ctx.save();
        ctx.globalAlpha = a;
        ctx.strokeStyle = "#eafcff";
        ctx.shadowColor = "#eafcff";
        ctx.shadowBlur = 24;
        ctx.lineWidth = 8 * a + 2;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(fx.x1, fx.y1);
        ctx.lineTo(fx.x2, fx.y2);
        ctx.stroke();
        ctx.restore();
      }

      // 体のスケルトン（薄く）
      if (lm) drawSkeleton(lm);

      // 竹刀の先端の光る軌跡
      drawTipTrail();

      // 竹刀
      if (sword) drawSword(sword);

      // ボスのHPバー
      drawBossUI();

      // 被弾フラッシュ
      if (flashAlpha > 0) {
        ctx.fillStyle = `rgba(255,77,109,${flashAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function drawBoss() {
      const b = boss;
      const yy = b.y + Math.sin(b.bob) * 8;
      // 隙のときは光る／防御のときは盾オーラ
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      if (b.st === "attack") {
        ctx.strokeStyle = "rgba(120,180,255,0.5)";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(b.x, yy, canvas.height * 0.135, 0, Math.PI * 2);
        ctx.stroke();
      }
      if (b.hitFlash > 0) { ctx.shadowColor = "#fff"; ctx.shadowBlur = 50; }
      else if (b.st === "vulnerable") { ctx.shadowColor = "#ffce54"; ctx.shadowBlur = 36; }
      ctx.font = Math.round(canvas.height * 0.2) + "px serif";
      ctx.fillText(b.emoji, b.x, yy);
      ctx.restore();
    }

    function drawHazards(dangerY) {
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for (const h of hazards) {
        ctx.save();
        ctx.translate(h.x, h.y);
        const grow = 0.7 + (h.y / dangerY) * 0.5;
        let scale = grow;
        if (h.dying) {
          const k = h.dieAge / DIE_FADE;
          ctx.globalAlpha = Math.max(0, 1 - k);
          scale = grow * (1 + k * 0.8);
        }
        ctx.scale(scale, scale);
        ctx.font = "60px serif";
        ctx.fillText(h.emoji, 0, 0);
        ctx.restore();
      }
      ctx.restore();
    }

    function drawBossUI() {
      const bw = canvas.width * 0.6;
      const bh = Math.max(16, canvas.height * 0.03);
      const bx = (canvas.width - bw) / 2;
      const by = canvas.height * 0.05;
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.45)";
      roundRect(bx, by, bw, bh, bh / 2); ctx.fill();
      const frac = boss.hp / boss.maxHp;
      if (frac > 0) {
        const g = ctx.createLinearGradient(bx, 0, bx + bw, 0);
        g.addColorStop(0, "#ff4d6d"); g.addColorStop(1, "#ff9f43");
        ctx.fillStyle = g;
        roundRect(bx, by, Math.max(bh, bw * frac), bh, bh / 2); ctx.fill();
      }
      ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 2;
      roundRect(bx, by, bw, bh, bh / 2); ctx.stroke();
      ctx.fillStyle = "#fff";
      ctx.font = "700 " + Math.round(bh * 0.92) + "px sans-serif";
      ctx.textBaseline = "bottom";
      ctx.textAlign = "left";
      ctx.fillText("👹 鬼の大将", bx + 2, by - 5);
      ctx.textAlign = "right";
      ctx.fillText(Math.ceil(boss.hp) + " / " + boss.maxHp, bx + bw - 2, by - 5);
      ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawSkeleton(lm) {
      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.lineWidth = 4;
      ctx.lineCap = "round";
      ctx.beginPath();
      for (const [a, b] of POSE_CONNECTIONS) {
        const pa = lm[a], pb = lm[b];
        if ((pa.visibility ?? 1) < 0.3 || (pb.visibility ?? 1) < 0.3) continue;
        ctx.moveTo(canvas.width - pa.x * canvas.width, pa.y * canvas.height);
        ctx.lineTo(canvas.width - pb.x * canvas.width, pb.y * canvas.height);
      }
      ctx.stroke();
      ctx.restore();
    }

    function drawTipTrail() {
      if (tipTrail.length < 2) return;
      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#eafcff";
      ctx.shadowColor = "#aef6ff";
      ctx.shadowBlur = 22;
      for (let i = 1; i < tipTrail.length; i++) {
        ctx.beginPath();
        ctx.globalAlpha = i / tipTrail.length;
        ctx.lineWidth = (i / tipTrail.length) * 18 + 2;
        ctx.moveTo(tipTrail[i - 1].x, tipTrail[i - 1].y);
        ctx.lineTo(tipTrail[i].x, tipTrail[i].y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawSword(s) {
      ctx.save();
      ctx.lineCap = "round";
      // 柄（持ち手）
      ctx.strokeStyle = "#4a2f1d";
      ctx.lineWidth = 16;
      ctx.beginPath();
      ctx.moveTo(s.handle.x, s.handle.y);
      ctx.lineTo(s.grip.x, s.grip.y);
      ctx.stroke();
      // 鍔
      ctx.fillStyle = "#caa24a";
      ctx.beginPath();
      ctx.arc(s.grip.x, s.grip.y, 11, 0, Math.PI * 2);
      ctx.fill();
      // 刀身（竹刀）
      ctx.strokeStyle = "#d8b884";
      ctx.lineWidth = 13;
      ctx.beginPath();
      ctx.moveTo(s.grip.x, s.grip.y);
      ctx.lineTo(s.tip.x, s.tip.y);
      ctx.stroke();
      // 刃の光
      ctx.strokeStyle = "rgba(255,255,255,0.85)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(s.grip.x, s.grip.y);
      ctx.lineTo(s.tip.x, s.tip.y);
      ctx.stroke();
      // 切先
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(s.tip.x, s.tip.y, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  </script>
</body>
