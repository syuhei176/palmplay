<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hand Kart 3D — 両手ハンドルのwebカメラ3Dレース</title>
  <style>
    :root { --bg: #0b0d1a; --accent: #38f9d7; --danger: #ff4d6d; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0b0d1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      overflow: hidden; -webkit-user-select: none; user-select: none;
    }
    #stage { position: relative; width: 100vw; height: 100vh; }
    #cam { display: none; }
    #game { width: 100%; height: 100%; display: block; }
    #pip, #wheel { position: absolute; pointer-events: none; }
    #pip { top: 70px; right: 16px; }
    #wheel { bottom: 14px; left: 50%; transform: translateX(-50%); }

    #flash {
      position: absolute; inset: 0; pointer-events: none;
      background: var(--danger); opacity: 0; transition: opacity .05s linear;
    }

    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 18px 24px; pointer-events: none; font-variant-numeric: tabular-nums;
    }
    #score { font-size: 34px; font-weight: 800; text-shadow: 0 2px 12px rgba(0,0,0,.7); }
    #score small { font-size: 13px; font-weight: 600; opacity: .7; display: block; letter-spacing: .12em; }
    #speed { font-size: 32px; font-weight: 800; text-align: right; text-shadow: 0 2px 12px rgba(0,0,0,.7); }
    #speed small { font-size: 13px; font-weight: 600; opacity: .7; display: block; letter-spacing: .15em; }
    #timer {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      font-size: 34px; font-weight: 800; letter-spacing: .04em;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
    }
    #timer.low { color: var(--danger); animation: pulse .6s ease-in-out infinite; }
    @keyframes pulse { 50% { transform: translateX(-50%) scale(1.14); } }

    #ammo {
      position: absolute; left: 24px; bottom: 18px; pointer-events: none;
      font-size: 26px; font-weight: 800; text-shadow: 0 2px 12px rgba(0,0,0,.7);
    }
    #ammo small { font-size: 12px; font-weight: 600; opacity: .7; display: block; letter-spacing: .12em; }

    #toast {
      position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%) scale(.6);
      font-size: clamp(34px, 9vw, 96px); font-weight: 900; pointer-events: none; opacity: 0;
      text-shadow: 0 4px 24px rgba(0,0,0,.6);
      background: linear-gradient(120deg, var(--accent), #ffd166);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    #toast.show { animation: toast 1s ease-out; }
    @keyframes toast {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.6); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
    }

    #overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 22px;
      background: rgba(8,10,22,.82); backdrop-filter: blur(6px); text-align: center; padding: 24px;
    }
    #overlay.hidden { display: none; }
    #overlay h1 {
      font-size: clamp(36px, 7vw, 78px); font-weight: 900; letter-spacing: .02em;
      background: linear-gradient(120deg, var(--accent), #ffd166);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    #overlay p { font-size: 17px; line-height: 1.8; opacity: .85; max-width: 480px; }
    #overlay .big { font-size: 60px; font-weight: 900; }
    .btn {
      pointer-events: auto; cursor: pointer; border: none; font: inherit; font-weight: 800; font-size: 22px;
      color: #07140f; background: linear-gradient(120deg, var(--accent), #ffd166);
      padding: 16px 44px; border-radius: 999px; box-shadow: 0 8px 30px rgba(56,249,215,.35);
      transition: transform .12s, box-shadow .12s;
    }
    .btn:hover { transform: translateY(-2px); }
    #err { color: var(--danger); font-size: 15px; max-width: 460px; line-height: 1.7; }
    .hint { font-size: 13px; opacity: .55; letter-spacing: .04em; }

    /* ローディング画面 */
    #loading { position: absolute; inset: 0; overflow: hidden; background: #05070f; display: none; z-index: 50; }
    #loading.show { display: block; }
    #loading .bg {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
      transform: scale(1.05); animation: ldZoom 9s ease-in-out infinite alternate;
    }
    @keyframes ldZoom { to { transform: scale(1.13); } }
    #loading .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(125% 85% at 50% 38%, transparent 42%, rgba(0,0,0,.6) 100%);
    }
    #loading .sweep {
      position: absolute; top: -10%; bottom: -10%; left: -50%; width: 45%;
      background: linear-gradient(100deg, transparent, rgba(255,255,255,.16), transparent);
      filter: blur(8px); transform: skewX(-12deg); animation: ldSweep 2.6s ease-in-out infinite;
    }
    @keyframes ldSweep { 0% { left: -50%; } 65%, 100% { left: 115%; } }
    #loading .foot {
      position: absolute; left: 50%; bottom: 8%; transform: translateX(-50%);
      width: min(560px, 82%); text-align: center;
    }
    #loading .status {
      font-size: 15px; font-weight: 800; letter-spacing: .18em; text-transform: uppercase;
      color: #eaf6ff; text-shadow: 0 2px 12px rgba(0,0,0,.85); margin-bottom: 13px;
    }
    #loading .dots::after { content: "···"; animation: ldDots 1.2s steps(4, end) infinite; }
    @keyframes ldDots { 0% { content: ""; } 25% { content: "·"; } 50% { content: "··"; } 75% { content: "···"; } }
    #loading .bar {
      position: relative; height: 11px; border-radius: 999px; background: rgba(255,255,255,.13);
      overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.08);
    }
    #loading .fill {
      position: absolute; left: 0; top: 0; bottom: 0; width: 0%; border-radius: 999px;
      background: linear-gradient(90deg, #ff3b54, #ff9d4d 45%, #38c8ff);
      box-shadow: 0 0 18px rgba(86,200,255,.75), 0 0 10px rgba(255,80,95,.7);
      transition: width .5s cubic-bezier(.2,.8,.2,1);
    }
    #loading .fill::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
      animation: ldShine 1.1s linear infinite;
    }
    @keyframes ldShine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    #loading .pct {
      margin-top: 11px; font-size: 13px; font-weight: 800; letter-spacing: .1em;
      color: #cfe6ff; font-variant-numeric: tabular-nums; text-shadow: 0 2px 10px rgba(0,0,0,.85);
    }
  </style>
</head>
<body>
  <div id="stage">
    <video id="cam" playsinline autoplay muted></video>
    <canvas id="game"></canvas>
    <canvas id="pip"></canvas>
    <canvas id="wheel"></canvas>
    <div id="flash"></div>
    <div id="toast"></div>

    <div id="hud">
      <div id="score">1<small>位 / 5</small></div>
      <div id="timer">LAP 1/3</div>
      <div id="speed">0<small>KM/H</small></div>
    </div>
    <div id="ammo">🚀 ×3<small>MISSILE</small></div>

    <div id="overlay">
      <h1>HAND&nbsp;KART&nbsp;3D</h1>
      <p><strong>両手でハンドルを握って回す</strong>とカートが曲がる。<br>
         ライバル4台と<strong>3ラップ</strong>レース！🏁 ゴールを目指せ。<br>
         ✊ <strong>グー（握りこぶし）</strong>か <strong>スペースキー</strong>でミサイル発射、前のライバルを攻撃。<br>
         🚀ボックスで補充、🪙コイン回収、🚧コーンでスピン。アクセルは自動。</p>
      <button class="btn" id="startBtn">スタート</button>
      <div class="hint">※ カメラの使用許可を求められたら「許可」を選んでください</div>
      <div id="err"></div>
    </div>

    <div id="loading">
      <img class="bg" src="loading-racing.png" alt="NOW LOADING" />
      <div class="vignette"></div>
      <div class="sweep"></div>
      <div class="foot">
        <div class="status"><span id="loadStatusText">起動中</span><span class="dots"></span></div>
        <div class="bar"><div class="fill" id="loadFill"></div></div>
        <div class="pct" id="loadPct">0%</div>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { Sky } from "three/addons/objects/Sky.js";
    import { RoundedBoxGeometry } from "three/addons/geometries/RoundedBoxGeometry.js";
    import {
      HandLandmarker,
      FilesetResolver,
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12";

    const video = document.getElementById("cam");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const scoreEl = document.getElementById("score");
    const speedEl = document.getElementById("speed");
    const timerEl = document.getElementById("timer");
    const ammoEl = document.getElementById("ammo");
    const toastEl = document.getElementById("toast");
    const flashEl = document.getElementById("flash");
    const loadingEl = document.getElementById("loading");
    const loadStatusText = document.getElementById("loadStatusText");
    const loadFill = document.getElementById("loadFill");
    const loadPct = document.getElementById("loadPct");
    const pip = document.getElementById("pip");
    const pctx = pip.getContext("2d");
    const wheelCv = document.getElementById("wheel");
    const wctx = wheelCv.getContext("2d");

    // ---- ゲームパラメータ ----
    const RACE_LAPS = 3;
    const NUM_RIVALS = 4;
    const TOTAL_RACERS = NUM_RIVALS + 1;
    const ROAD_W = 24;
    const MAX_SPEED = 95;
    const ACCEL = 45;
    const MAX_WHEEL_ANGLE = 0.6;
    const STEER_RATE = 32;
    const CAM_BACK = 22, CAM_UP = 11, CAM_LOOK = 14;
    const KART_LIFT = 0.2;

    // ---- ミサイル ----
    const START_AMMO = 3, MAX_AMMO = 5;
    const MISSILE_SPEED = MAX_SPEED * 2.3;
    const FIRE_CD = 0.6;

    const RIVAL_COLORS = [
      { body: 0x2f9c43, driver: 0x123f1a, cap: 0x2c9a3c },
      { body: 0x7b3ff0, driver: 0x331b63, cap: 0x8a46f0 },
      { body: 0xe39316, driver: 0x6e4400, cap: 0xe89a16 },
      { body: 0x1196b0, driver: 0x08454f, cap: 0x12aabc },
    ];

    // ---- Three.js ----
    let renderer, scene, camera, kart, sun;
    let trackCurve = null, trackLen = 0;
    const sunDir = new THREE.Vector3();
    const items = [];
    let rivals = [];
    let missiles = [];
    let effects = [];
    const UP = new THREE.Vector3(0, 1, 0);
    const SPHERE = new THREE.SphereGeometry(1, 12, 10);

    // ---- 手検出 ----
    let handLandmarker = null;
    let lastVideoTime = -1, lastHands = [];

    // ---- 状態 ----
    let state = "idle";
    let distAlong = 0, distanceTotal = 0, lateral = 0, speed = 0;
    let steering = 0, gripping = false;
    let coins = 0, spinTimer = 0, spinYaw = 0;
    let ammo = START_AMMO, fireCD = 0, prevFist = false;
    let playerFinished = false, playerRank = 0, finishCount = 0, raceTime = 0;
    let lastTime = 0;

    async function loadModel() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm"
      );
      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU",
        },
        runningMode: "VIDEO",
        numHands: 2,
      });
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();
    }

    // ---- 路面テクスチャ（アスファルト＋センターライン＋縁石）----
    function makeRoadTexture() {
      const c = document.createElement("canvas");
      c.width = 128; c.height = 128;
      const g = c.getContext("2d");
      g.fillStyle = "#41454c"; g.fillRect(0, 0, 128, 128);
      for (let i = 0; i < 1200; i++) {
        const v = Math.random();
        g.fillStyle = `rgba(${v > .5 ? 255 : 0},${v > .5 ? 255 : 0},${v > .5 ? 255 : 0},${Math.random() * 0.06})`;
        g.fillRect(Math.random() * 128, Math.random() * 128, 2, 2);
      }
      for (let y = 0; y < 128; y += 16) {
        g.fillStyle = (y / 16) % 2 ? "#e7e7e7" : "#c92f3f";
        g.fillRect(0, y, 11, 16); g.fillRect(117, y, 11, 16);
      }
      g.fillStyle = "#e9c441";
      for (let y = 0; y < 128; y += 40) g.fillRect(61, y, 7, 22);
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      return tex;
    }

    function makeCheckerTexture(repeat) {
      const c = document.createElement("canvas");
      c.width = c.height = 64;
      const g = c.getContext("2d");
      const n = 8, s = 64 / n;
      for (let y = 0; y < n; y++)
        for (let x = 0; x < n; x++) {
          g.fillStyle = (x + y) % 2 ? "#111" : "#fff";
          g.fillRect(x * s, y * s, s, s);
        }
      const t = new THREE.CanvasTexture(c);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.colorSpace = THREE.SRGBColorSpace;
      t.repeat.set(repeat, 1);
      return t;
    }

    // ---- 共有マテリアル ----
    let MAT = null;
    function mats() {
      if (MAT) return MAT;
      MAT = {
        tire: new THREE.MeshStandardMaterial({ color: 0x14151a, roughness: 0.85, metalness: 0.0 }),
        rim: new THREE.MeshStandardMaterial({ color: 0xc7ccd4, roughness: 0.25, metalness: 0.95 }),
        metal: new THREE.MeshStandardMaterial({ color: 0x2b2e34, roughness: 0.45, metalness: 0.85 }),
        steel: new THREE.MeshStandardMaterial({ color: 0x9aa0a8, roughness: 0.32, metalness: 0.92 }),
        visor: new THREE.MeshStandardMaterial({ color: 0x0c0f14, roughness: 0.08, metalness: 0.5 }),
        warhead: new THREE.MeshStandardMaterial({ color: 0xb23b2e, roughness: 0.4, metalness: 0.5 }),
      };
      return MAT;
    }

    // ---- コース生成 ----
    function buildTrack() {
      for (const it of items) scene.remove(it.mesh);
      items.length = 0;

      const pts = [];
      const N = 11, BASE_R = 280;
      for (let i = 0; i < N; i++) {
        const a = (i / N) * Math.PI * 2;
        const r = BASE_R + Math.sin(i * 1.3) * 36 + (Math.random() * 30 - 15);
        const h = Math.sin(i * 0.8) * 18 + (Math.random() * 10 - 5);
        pts.push(new THREE.Vector3(Math.cos(a) * r, h, Math.sin(a) * r));
      }
      trackCurve = new THREE.CatmullRomCurve3(pts, true, "catmullrom", 0.5);
      trackLen = trackCurve.getLength();

      const STEPS = 900;
      const roadPos = [], roadUv = [], roadIdx = [];
      const grassPos = [], grassIdx = [];
      const GRASS_W = 70;
      let minY = Infinity;
      for (let i = 0; i <= STEPS; i++) {
        const t = i / STEPS;
        const p = trackCurve.getPointAt(t);
        if (p.y < minY) minY = p.y;
        const tan = trackCurve.getTangentAt(t).normalize();
        const side = new THREE.Vector3().crossVectors(tan, UP).normalize();
        const L = p.clone().addScaledVector(side, -ROAD_W);
        const R = p.clone().addScaledVector(side, ROAD_W);
        roadPos.push(L.x, L.y, L.z, R.x, R.y, R.z);
        const v = t * STEPS * 0.12;
        roadUv.push(0, v, 1, v);
        const gy = p.y - 0.6;
        const FL = p.clone().addScaledVector(side, -GRASS_W); FL.y = gy;
        const FR = p.clone().addScaledVector(side, GRASS_W); FR.y = gy;
        grassPos.push(FL.x, FL.y, FL.z, FR.x, FR.y, FR.z);
      }
      for (let i = 0; i < STEPS; i++) {
        const a = i * 2, b = a + 1, c = a + 2, d = a + 3;
        roadIdx.push(a, b, d, a, d, c);
        grassIdx.push(a, b, d, a, d, c);
      }

      if (scene.getObjectByName("road")) scene.remove(scene.getObjectByName("road"));
      if (scene.getObjectByName("grass")) scene.remove(scene.getObjectByName("grass"));

      const roadGeo = new THREE.BufferGeometry();
      roadGeo.setAttribute("position", new THREE.Float32BufferAttribute(roadPos, 3));
      roadGeo.setAttribute("uv", new THREE.Float32BufferAttribute(roadUv, 2));
      roadGeo.setIndex(roadIdx);
      roadGeo.computeVertexNormals();
      const road = new THREE.Mesh(roadGeo, new THREE.MeshStandardMaterial({
        map: makeRoadTexture(), roughness: 0.95, metalness: 0.0,
      }));
      road.name = "road"; road.receiveShadow = true;
      scene.add(road);

      const grassGeo = new THREE.BufferGeometry();
      grassGeo.setAttribute("position", new THREE.Float32BufferAttribute(grassPos, 3));
      grassGeo.setIndex(grassIdx);
      grassGeo.computeVertexNormals();
      const grass = new THREE.Mesh(grassGeo, new THREE.MeshStandardMaterial({ color: 0x5c7a3e, roughness: 1.0 }));
      grass.name = "grass"; grass.receiveShadow = true;
      scene.add(grass);

      if (scene.getObjectByName("ground")) scene.remove(scene.getObjectByName("ground"));
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(5000, 5000),
        new THREE.MeshStandardMaterial({ color: 0x4c6234, roughness: 1.0 })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = minY - 6;
      ground.name = "ground"; ground.receiveShadow = true;
      scene.add(ground);

      buildFinishGate();
      placeItems();
    }

    function buildFinishGate() {
      if (scene.getObjectByName("finish")) scene.remove(scene.getObjectByName("finish"));
      const g = new THREE.Group(); g.name = "finish";
      const p = trackCurve.getPointAt(0);
      const tan = trackCurve.getTangentAt(0).normalize();
      const side = new THREE.Vector3().crossVectors(tan, UP).normalize();
      const yaw = Math.atan2(tan.x, tan.z);

      const postMat = new THREE.MeshStandardMaterial({ color: 0xf2f2f2, roughness: 0.6, metalness: 0.2 });
      const postGeo = new THREE.BoxGeometry(2.4, 18, 2.4);
      for (const s of [-1, 1]) {
        const post = new THREE.Mesh(postGeo, postMat);
        post.position.copy(p).addScaledVector(side, s * (ROAD_W + 2));
        post.position.y += 9; post.castShadow = true;
        g.add(post);
      }
      const banner = new THREE.Mesh(
        new THREE.PlaneGeometry(ROAD_W * 2 + 8, 5),
        new THREE.MeshBasicMaterial({ map: makeCheckerTexture(8), side: THREE.DoubleSide })
      );
      banner.position.copy(p); banner.position.y += 15.5;
      banner.rotation.y = yaw;
      g.add(banner);
      scene.add(g);
    }

    function itemPosition(t, lat, lift) {
      const p = trackCurve.getPointAt(t % 1);
      const tan = trackCurve.getTangentAt(t % 1).normalize();
      const side = new THREE.Vector3().crossVectors(tan, UP).normalize();
      return p.addScaledVector(side, lat).add(new THREE.Vector3(0, lift, 0));
    }

    let coinGeo, coinMat, coneGeo, coneMat, coneBand, ammoGeo, ammoMat;
    function placeItems() {
      coinGeo = coinGeo || new THREE.CylinderGeometry(1.5, 1.5, 0.35, 22);
      coinMat = coinMat || new THREE.MeshStandardMaterial({
        color: 0xffd23f, metalness: 0.9, roughness: 0.2, emissive: 0x3a2600,
      });
      coneGeo = coneGeo || new THREE.ConeGeometry(2.2, 4.5, 20);
      coneMat = coneMat || new THREE.MeshStandardMaterial({ color: 0xff6a16, roughness: 0.5, metalness: 0.0 });
      coneBand = coneBand || new THREE.CylinderGeometry(1.45, 1.7, 0.7, 20);
      ammoGeo = ammoGeo || new THREE.BoxGeometry(2.8, 2.8, 2.8);
      ammoMat = ammoMat || new THREE.MeshStandardMaterial({
        color: 0x18d6c4, emissive: 0x0a5b53, metalness: 0.4, roughness: 0.35,
      });

      for (let i = 0; i < 80; i++) {
        const t = 0.04 + Math.random() * 0.94;
        const lat = (Math.random() * 2 - 1) * (ROAD_W - 4);
        const g = new THREE.Group();
        const m = new THREE.Mesh(coinGeo, coinMat);
        m.rotation.x = Math.PI / 2;
        g.add(m);
        g.position.copy(itemPosition(t, lat, 2.4));
        g.castShadow = true;
        scene.add(g);
        items.push({ type: "coin", t, lateral: lat, mesh: g, alive: true });
      }
      for (let i = 0; i < 24; i++) {
        const t = 0.06 + Math.random() * 0.9;
        const lat = (Math.random() * 2 - 1) * (ROAD_W - 3);
        const g = new THREE.Group();
        const body = new THREE.Mesh(coneGeo, coneMat); body.castShadow = true; g.add(body);
        const band = new THREE.Mesh(coneBand, new THREE.MeshStandardMaterial({ color: 0xf2f2f2, roughness: 0.6 }));
        band.position.y = 0.6; g.add(band);
        g.position.copy(itemPosition(t, lat, 2.25));
        scene.add(g);
        items.push({ type: "obstacle", t, lateral: lat, mesh: g, alive: true });
      }
      for (let i = 0; i < 16; i++) {
        const t = 0.05 + Math.random() * 0.92;
        const lat = (Math.random() * 2 - 1) * (ROAD_W - 4);
        const m = new THREE.Mesh(ammoGeo, ammoMat);
        m.position.copy(itemPosition(t, lat, 2.6));
        m.castShadow = true;
        scene.add(m);
        items.push({ type: "ammo", t, lateral: lat, mesh: m, alive: true });
      }
    }

    // ---- リアルなカート ----
    function buildWheel(radius, width) {
      const m = mats();
      const g = new THREE.Group();
      const tire = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, width, 24), m.tire);
      tire.rotation.z = Math.PI / 2; tire.castShadow = true; g.add(tire);
      const rim = new THREE.Mesh(new THREE.CylinderGeometry(radius * 0.5, radius * 0.5, width + 0.08, 16), m.rim);
      rim.rotation.z = Math.PI / 2; g.add(rim);
      return g;
    }

    function buildKart(opts = {}) {
      const m = mats();
      const bodyC = opts.body ?? 0xc62a2a;
      const bodyMat = new THREE.MeshStandardMaterial({ color: bodyC, roughness: 0.3, metalness: 0.5 });
      const suitMat = new THREE.MeshStandardMaterial({ color: opts.driver ?? 0x2350c8, roughness: 0.6, metalness: 0.1 });
      const helmMat = new THREE.MeshStandardMaterial({ color: opts.cap ?? bodyC, roughness: 0.16, metalness: 0.3 });
      const g = new THREE.Group(); g.rotation.order = "YXZ";

      const floor = new THREE.Mesh(new RoundedBoxGeometry(4.0, 0.4, 7.4, 2, 0.18), m.metal);
      floor.position.y = 1.0; floor.castShadow = true; g.add(floor);

      const tub = new THREE.Mesh(new RoundedBoxGeometry(2.8, 1.0, 4.4, 3, 0.3), bodyMat);
      tub.position.set(0, 1.55, -0.2); tub.castShadow = true; g.add(tub);

      const nose = new THREE.Mesh(new RoundedBoxGeometry(2.2, 0.7, 2.6, 2, 0.25), bodyMat);
      nose.position.set(0, 1.3, 3.1); nose.castShadow = true; g.add(nose);

      const split = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.16, 1.0), m.metal);
      split.position.set(0, 0.95, 4.1); g.add(split);

      for (const s of [-1, 1]) {
        const pod = new THREE.Mesh(new RoundedBoxGeometry(0.9, 0.8, 3.4, 2, 0.25), bodyMat);
        pod.position.set(s * 1.95, 1.25, -0.3); pod.castShadow = true; g.add(pod);
      }

      const eng = new THREE.Mesh(new RoundedBoxGeometry(2.2, 1.1, 1.6, 2, 0.2), m.metal);
      eng.position.set(0, 1.7, -2.6); eng.castShadow = true; g.add(eng);

      const wing = new THREE.Mesh(new THREE.BoxGeometry(4.2, 0.16, 1.1), bodyMat);
      wing.position.set(0, 2.9, -3.5); wing.castShadow = true; g.add(wing);
      for (const s of [-1, 1]) {
        const sup = new THREE.Mesh(new THREE.BoxGeometry(0.18, 1.1, 0.3), m.metal);
        sup.position.set(s * 1.0, 2.35, -3.4); g.add(sup);
      }

      const torso = new THREE.Mesh(new RoundedBoxGeometry(1.7, 1.5, 1.5, 2, 0.3), suitMat);
      torso.position.set(0, 2.2, -0.5); torso.castShadow = true; g.add(torso);
      const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.88, 20, 16), helmMat);
      helmet.position.set(0, 3.25, -0.3); helmet.castShadow = true; g.add(helmet);
      const visor = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.4, 0.4), m.visor);
      visor.position.set(0, 3.3, 0.34); g.add(visor);

      const wheelDefs = [
        [-2.45, 1.1, 2.7, 1.1, 0.95], [2.45, 1.1, 2.7, 1.1, 0.95],
        [-2.6, 1.35, -2.4, 1.35, 1.25], [2.6, 1.35, -2.4, 1.35, 1.25],
      ];
      for (const [x, y, z, r, w] of wheelDefs) {
        const wheel = buildWheel(r, w);
        wheel.position.set(x, y, z); g.add(wheel);
      }
      return g;
    }

    // ---- リアルなミサイル ----
    function buildMissile() {
      const m = mats();
      const g = new THREE.Group(); g.rotation.order = "YXZ";
      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, 3.0, 16), m.steel);
      body.rotation.x = Math.PI / 2; body.castShadow = true; g.add(body);
      const nose = new THREE.Mesh(new THREE.ConeGeometry(0.45, 1.3, 16), m.warhead);
      nose.rotation.x = Math.PI / 2; nose.position.z = 2.15; g.add(nose);
      for (let i = 0; i < 4; i++) {
        const fin = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.0, 0.9), m.metal);
        const a = i * Math.PI / 2;
        fin.position.set(Math.cos(a) * 0.5, Math.sin(a) * 0.5, -1.25);
        fin.rotation.z = a; g.add(fin);
      }
      const flame = new THREE.Mesh(
        new THREE.ConeGeometry(0.42, 1.7, 12),
        new THREE.MeshBasicMaterial({ color: 0xffb030, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false })
      );
      flame.rotation.x = -Math.PI / 2; flame.position.z = -2.25; g.add(flame);
      g.userData.flame = flame;
      return g;
    }

    // ---- ライバル ----
    const RIVAL_LANES = [-13, 13, -7, 7];
    function spawnRivals() {
      for (const r of rivals) scene.remove(r.mesh);
      rivals = [];
      for (let i = 0; i < NUM_RIVALS; i++) {
        const mesh = buildKart(RIVAL_COLORS[i % RIVAL_COLORS.length]);
        scene.add(mesh);
        const lane = RIVAL_LANES[i % RIVAL_LANES.length];
        rivals.push({
          mesh, dist: (i + 1) * 8, lateral: lane, laneBase: lane,
          speed: MAX_SPEED * 0.8, baseSpeed: MAX_SPEED * (0.9 + Math.random() * 0.08),
          phase: Math.random() * Math.PI * 2, spinTimer: 0, spinYaw: 0,
          finished: false, finishRank: 0,
        });
      }
    }
    function resetRivals() {
      rivals.forEach((r, i) => {
        r.dist = (i + 1) * 8;
        r.laneBase = RIVAL_LANES[i % RIVAL_LANES.length];
        r.lateral = r.laneBase;
        r.speed = MAX_SPEED * 0.8;
        r.spinTimer = 0; r.spinYaw = 0;
        r.finished = false; r.finishRank = 0;
        r.mesh.visible = true;
      });
    }

    // ---- トラック上配置 ----
    const _v1 = new THREE.Vector3(), _v2 = new THREE.Vector3(), _v3 = new THREE.Vector3();
    function placeOnTrack(obj, dist, lat, yawExtra) {
      let t = (dist % trackLen) / trackLen;
      if (t < 0) t += 1;
      trackCurve.getPointAt(t, _v1);
      trackCurve.getTangentAt(t, _v2).normalize();
      _v3.crossVectors(_v2, UP).normalize();
      obj.position.copy(_v1).addScaledVector(_v3, lat);
      obj.position.y += KART_LIFT;
      const yaw = Math.atan2(_v2.x, _v2.z);
      const pitch = -Math.asin(Math.max(-1, Math.min(1, _v2.y)));
      obj.rotation.set(pitch, yaw + (yawExtra || 0), 0);
    }
    function trackWorldPos(dist, lat, lift) {
      let t = (dist % trackLen) / trackLen;
      if (t < 0) t += 1;
      trackCurve.getPointAt(t, _v1);
      trackCurve.getTangentAt(t, _v2).normalize();
      _v3.crossVectors(_v2, UP).normalize();
      return _v1.clone().addScaledVector(_v3, lat).add(new THREE.Vector3(0, lift, 0));
    }

    // ---- シーン初期化 ----
    function initScene() {
      const canvas = document.getElementById("game");
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 0.95;

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(66, window.innerWidth / window.innerHeight, 0.5, 2000);

      // 大気散乱の空（FarCry風のリアルな空）
      const sky = new Sky();
      sky.scale.setScalar(8000);
      const u = sky.material.uniforms;
      u.turbidity.value = 6;
      u.rayleigh.value = 2.2;
      u.mieCoefficient.value = 0.004;
      u.mieDirectionalG.value = 0.85;
      const elevation = 17, azimuth = 150;
      const phi = THREE.MathUtils.degToRad(90 - elevation);
      const theta = THREE.MathUtils.degToRad(azimuth);
      sunDir.setFromSphericalCoords(1, phi, theta);
      u.sunPosition.value.copy(sunDir);

      // 空を環境マップ化（金属に空が映り込む）
      const pmrem = new THREE.PMREMGenerator(renderer);
      const envScene = new THREE.Scene(); envScene.add(sky);
      scene.environment = pmrem.fromScene(envScene).texture;
      scene.add(sky);
      pmrem.dispose();

      // 地平のヘイズ（空のhorizon色に寄せて継ぎ目を消す）
      scene.fog = new THREE.Fog(0xc7d6df, 320, 1300);

      scene.add(new THREE.HemisphereLight(0xbfd6ff, 0x55663f, 0.4));
      sun = new THREE.DirectionalLight(0xfff1dd, 2.8);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      sun.shadow.bias = -0.0004;
      const sc = sun.shadow.camera;
      sc.near = 80; sc.far = 1400; sc.left = -130; sc.right = 130; sc.top = 130; sc.bottom = -130;
      scene.add(sun);
      scene.add(sun.target);

      kart = buildKart();
      scene.add(kart);

      window.addEventListener("resize", onResize);
      window.addEventListener("keydown", (e) => {
        if (e.code === "Space") { e.preventDefault(); if (state === "playing") fireMissile(); }
      });
    }

    function onResize() {
      if (!renderer) return;
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      sizePip();
    }

    function sizePip() {
      const pw = Math.round(Math.min(260, window.innerWidth * 0.24));
      const ph = Math.round(pw * 9 / 16);
      pip.width = pw; pip.height = ph;
      pip.style.width = pw + "px"; pip.style.height = ph + "px";
      const ws = Math.round(Math.min(150, window.innerWidth * 0.22));
      wheelCv.width = ws; wheelCv.height = ws;
      wheelCv.style.width = ws + "px"; wheelCv.style.height = ws + "px";
    }

    // ---- 手検出 ----
    function isFist(lm) {
      const w = lm[0];
      const d = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
      let curled = 0;
      for (const [tip, mcp] of [[8, 5], [12, 9], [16, 13], [20, 17]]) {
        if (d(lm[tip], w) < d(lm[mcp], w) * 1.05) curled++;
      }
      return curled >= 3;
    }
    function detectHands(nowMs) {
      if (video.currentTime === lastVideoTime) return lastHands;
      lastVideoTime = video.currentTime;
      const out = [];
      const res = handLandmarker.detectForVideo(video, nowMs);
      if (res?.landmarks) {
        for (const lm of res.landmarks) {
          const c = lm[9];
          out.push({ x: 1 - c.x, y: c.y, fist: isFist(lm) });
        }
      }
      lastHands = out;
      return out;
    }

    // ---- ミサイル ----
    function nearestTargetAhead() {
      let best = null, bestGap = Infinity;
      for (const r of rivals) {
        if (r.finished) continue;
        const gap = r.dist - distanceTotal;
        if (gap > 2 && gap < 700 && gap < bestGap) { bestGap = gap; best = r; }
      }
      return best;
    }
    function fireMissile() {
      if (ammo <= 0 || fireCD > 0 || spinTimer > 0 || playerFinished) return;
      ammo--; fireCD = FIRE_CD; updateAmmo();
      const m = buildMissile();
      scene.add(m);
      missiles.push({ mesh: m, dist: distanceTotal + 6, lateral, target: nearestTargetAhead(), life: 4, trailT: 0, dead: false });
      showToast("🚀 FIRE!");
    }
    function updateMissiles(dt) {
      for (const mo of missiles) {
        mo.life -= dt;
        mo.dist += MISSILE_SPEED * dt;
        let hit = false;
        if (mo.target && !mo.target.finished) {
          mo.lateral += (mo.target.lateral - mo.lateral) * Math.min(1, dt * 6);
          if (mo.dist >= mo.target.dist) {
            mo.target.spinTimer = 1.7; mo.target.speed *= 0.25;
            spawnExplosion(mo.target.dist, mo.target.lateral);
            hit = true;
          }
        } else {
          mo.target = null;
        }
        if (hit || mo.life <= 0) { scene.remove(mo.mesh); mo.dead = true; continue; }
        placeOnTrack(mo.mesh, mo.dist, mo.lateral, 0);
        mo.mesh.position.y += 1.6;
        // 噴射炎の揺らぎ
        const fl = mo.mesh.userData.flame;
        if (fl) { fl.scale.set(1, 0.7 + Math.random() * 0.8, 1); fl.material.opacity = 0.7 + Math.random() * 0.3; }
        // スモークの航跡
        mo.trailT -= dt;
        if (mo.trailT <= 0) {
          mo.trailT = 0.025;
          const tail = mo.mesh.localToWorld(new THREE.Vector3(0, 0, -2.6));
          spawnSmoke(tail, 0.6, 0.45, 3, 0xb9b9b9, 0.5);
        }
      }
      missiles = missiles.filter((m) => !m.dead);
    }

    function spawnSmoke(pos, scale, life, rise, color, op) {
      const m = new THREE.Mesh(SPHERE, new THREE.MeshBasicMaterial({ color, transparent: true, opacity: op, depthWrite: false }));
      m.position.copy(pos); m.scale.setScalar(scale);
      scene.add(m);
      effects.push({ mesh: m, age: 0, life, s0: scale, grow: scale * 2.2, rise, op0: op });
    }
    function spawnExplosion(dist, lat) {
      const pos = trackWorldPos(dist, lat, 2.2);
      const core = new THREE.Mesh(SPHERE, new THREE.MeshBasicMaterial({
        color: 0xffd66a, transparent: true, opacity: 1, blending: THREE.AdditiveBlending, depthWrite: false,
      }));
      core.position.copy(pos);
      scene.add(core);
      effects.push({ mesh: core, age: 0, life: 0.4, s0: 1.5, grow: 9, rise: 0, op0: 1 });
      for (let i = 0; i < 7; i++) {
        const off = new THREE.Vector3((Math.random() * 2 - 1) * 2, Math.random() * 2.4, (Math.random() * 2 - 1) * 2);
        spawnSmoke(pos.clone().add(off), 1.2 + Math.random() * 1.6, 0.7 + Math.random() * 0.5, 7, 0x9a9a9a, 0.65);
      }
      flash(0.3);
    }
    function updateEffects(dt) {
      for (const e of effects) {
        e.age += dt;
        const k = e.age / e.life;
        e.mesh.scale.setScalar(e.s0 + e.grow * k);
        e.mesh.position.y += e.rise * dt;
        e.mesh.material.opacity = Math.max(0, e.op0 * (1 - k));
        if (k >= 1) { scene.remove(e.mesh); e.dead = true; }
      }
      effects = effects.filter((e) => !e.dead);
    }

    // ---- ライバルAI ----
    function updateRivals(dt) {
      for (const r of rivals) {
        let target = r.baseSpeed;
        if (!r.finished) {
          if (r.dist < distanceTotal - 10) target = r.baseSpeed * 1.10;
          else if (r.dist > distanceTotal + 10) target = r.baseSpeed * 0.95;
        }
        if (r.spinTimer > 0) { r.spinTimer -= dt; r.spinYaw += dt * 14; target = 0; }
        else r.spinYaw = 0;
        r.speed += (target - r.speed) * Math.min(1, dt * 2.5);
        if (r.speed < 0) r.speed = 0;
        r.dist += r.speed * dt;
        const want = r.laneBase + Math.sin(r.dist * 0.02 + r.phase) * (ROAD_W * 0.35);
        r.lateral += (want - r.lateral) * Math.min(1, dt * 1.5);
        if (!r.finished && r.dist >= RACE_LAPS * trackLen) {
          r.finished = true; r.finishRank = ++finishCount;
        }
        placeOnTrack(r.mesh, r.dist, r.lateral, r.spinYaw);
      }
    }

    // ---- 順位 ----
    function prog(finished, finishRank, dist) {
      return finished ? 1e12 - finishRank : dist;
    }
    function liveRank() {
      const me = prog(playerFinished, playerRank, distanceTotal);
      let ahead = 0;
      for (const r of rivals) if (prog(r.finished, r.finishRank, r.dist) > me) ahead++;
      return ahead + 1;
    }
    function currentLap() {
      return Math.min(RACE_LAPS, Math.floor(distanceTotal / trackLen) + 1);
    }

    // ---- ローディング画面 ----
    function showLoading(pct, status) {
      loadingEl.classList.add("show");
      if (status != null) loadStatusText.textContent = status;
      loadFill.style.width = pct + "%";
      loadPct.textContent = Math.round(pct) + "%";
    }
    function hideLoading() { loadingEl.classList.remove("show"); }
    const wait = (ms) => new Promise((r) => setTimeout(r, ms));

    // モデルDLは進捗を取れないので、待っている間バーをじわっと進める
    async function loadModelWithProgress() {
      let p = 45;
      const id = setInterval(() => { p += (88 - p) * 0.08; showLoading(p, "AIモデルを読み込み中"); }, 200);
      try { await loadModel(); } finally { clearInterval(id); }
    }

    // ---- ゲーム制御 ----
    startBtn.addEventListener("click", async () => {
      try {
        overlay.classList.add("hidden");
        showLoading(8, "カメラを起動中");
        await startCamera();
        showLoading(40, "カメラを起動中");
        if (!handLandmarker) await loadModelWithProgress();
        showLoading(90, "コースを生成中");
        if (!renderer) initScene();
        sizePip();
        buildTrack();
        spawnRivals();
        resetGame();
        showLoading(100, "スタート");
        await wait(450);
        hideLoading();
        state = "playing";
        lastTime = performance.now();
        requestAnimationFrame(loop);
      } catch (e) {
        console.error(e);
        hideLoading();
        showError(e);
      }
    });

    function showError(e) {
      overlay.classList.remove("hidden");
      const msg =
        e?.name === "NotAllowedError"
          ? "カメラの使用が許可されませんでした。ブラウザのカメラ設定から許可してください。"
          : "起動に失敗しました（" + (e?.message || e) + "）。https もしくは localhost で開いているか確認してください。";
      overlay.innerHTML =
        '<h1>HAND&nbsp;KART&nbsp;3D</h1><div id="err"></div><button class="btn" id="retry">もう一度</button>';
      overlay.querySelector("#err").textContent = msg;
      overlay.querySelector("#retry").addEventListener("click", () => location.reload());
    }

    function resetGame() {
      distAlong = 0; distanceTotal = 0; lateral = 0; speed = 0;
      steering = 0; coins = 0; spinTimer = 0; spinYaw = 0;
      ammo = START_AMMO; fireCD = 0; prevFist = false;
      playerFinished = false; playerRank = 0; finishCount = 0; raceTime = 0;
      for (const m of missiles) scene.remove(m.mesh); missiles = [];
      for (const e of effects) scene.remove(e.mesh); effects = [];
      for (const it of items) { it.alive = true; it.mesh.visible = true; }
      resetRivals();
      updateHud(); updateAmmo();
    }

    function updateHud() {
      scoreEl.innerHTML = liveRank() + "<small>位 / " + TOTAL_RACERS + "</small>";
      speedEl.innerHTML = Math.floor((speed / MAX_SPEED) * 200) + "<small>KM/H</small>";
      const lap = currentLap();
      timerEl.textContent = "LAP " + lap + "/" + RACE_LAPS;
      timerEl.classList.toggle("low", lap >= RACE_LAPS);
    }
    function updateAmmo() {
      ammoEl.innerHTML = "🚀 ×" + ammo + "<small>MISSILE</small>";
      ammoEl.style.opacity = ammo > 0 ? "1" : "0.45";
    }
    function flash(a) { flashEl.style.opacity = a; }

    let toastT = null;
    function showToast(text) {
      toastEl.textContent = text;
      toastEl.classList.remove("show");
      void toastEl.offsetWidth;
      toastEl.classList.add("show");
      clearTimeout(toastT);
      toastT = setTimeout(() => toastEl.classList.remove("show"), 1000);
    }
    function fmtTime(s) {
      const m = Math.floor(s / 60), ss = (s % 60).toFixed(1).padStart(4, "0");
      return m + ":" + ss;
    }

    function finishRace() {
      state = "over";
      const place = liveRank();
      const title = place === 1 ? "🏁 1位 WIN!" : "🏁 " + place + "位 / " + TOTAL_RACERS;
      overlay.classList.remove("hidden");
      overlay.innerHTML =
        "<h1>" + title + "</h1>" +
        "<p>" + RACE_LAPS + "ラップ完走　TIME " + fmtTime(raceTime) + "</p>" +
        '<div class="big">' + place + " / " + TOTAL_RACERS + "</div>" +
        "<p>🪙 × " + coins + "　🚀 残り " + ammo + "</p>" +
        '<button class="btn" id="again">もう一度</button>';
      overlay.querySelector("#again").addEventListener("click", () => {
        buildTrack(); spawnRivals(); resetGame();
        overlay.classList.add("hidden");
        state = "playing"; lastTime = performance.now();
        requestAnimationFrame(loop);
      });
    }

    // ---- メインループ ----
    const _center = new THREE.Vector3();
    const _tan = new THREE.Vector3();
    const _side = new THREE.Vector3();
    const _camPos = new THREE.Vector3();
    const _look = new THREE.Vector3();

    function loop(now) {
      if (state !== "playing") return;
      const dt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now; raceTime += dt;
      if (fireCD > 0) fireCD -= dt;

      const hands = detectHands(now);
      gripping = hands.length >= 2;
      if (gripping && spinTimer <= 0) {
        const hs = hands.slice(0, 2).sort((a, b) => a.x - b.x);
        const L = hs[0], R = hs[1];
        const ang = Math.atan2(R.y - L.y, R.x - L.x);
        const target = Math.max(-1, Math.min(1, ang / MAX_WHEEL_ANGLE));
        steering += (target - steering) * Math.min(1, dt * 12);
      } else {
        steering *= 1 - Math.min(1, dt * 3);
      }

      const anyFist = hands.some((h) => h.fist);
      if (anyFist && !prevFist) fireMissile();
      prevFist = anyFist;

      speed += ACCEL * dt;
      if (speed > MAX_SPEED) speed = MAX_SPEED;
      const offRoad = Math.abs(lateral) > ROAD_W;
      if (offRoad && speed > MAX_SPEED * 0.45) speed -= ACCEL * 2.2 * dt;

      distAlong = (distAlong + speed * dt) % trackLen;
      distanceTotal += speed * dt;
      const t = distAlong / trackLen;

      const sf = speed / MAX_SPEED;
      if (spinTimer > 0) {
        spinTimer -= dt; spinYaw += dt * 14;
      } else {
        spinYaw = 0;
        lateral += steering * STEER_RATE * dt * (0.4 + 0.6 * sf);
      }
      lateral = Math.max(-ROAD_W * 1.5, Math.min(ROAD_W * 1.5, lateral));

      trackCurve.getPointAt(t, _center);
      trackCurve.getTangentAt(t, _tan).normalize();
      _side.crossVectors(_tan, UP).normalize();
      kart.position.copy(_center).addScaledVector(_side, lateral);
      kart.position.y += KART_LIFT;
      const yaw = Math.atan2(_tan.x, _tan.z);
      const pitch = -Math.asin(Math.max(-1, Math.min(1, _tan.y)));
      kart.rotation.set(pitch, yaw + spinYaw, -steering * 0.22);

      for (const it of items) {
        if (it.alive) {
          let d = it.t - t; d -= Math.round(d);
          const along = Math.abs(d) * trackLen;
          if (along < 5.5 && Math.abs(it.lateral - lateral) < 4.2) {
            if (it.type === "coin") {
              coins++; it.alive = false; it.mesh.visible = false; flash(0.12);
            } else if (it.type === "ammo") {
              ammo = Math.min(MAX_AMMO, ammo + 1); updateAmmo();
              it.alive = false; it.mesh.visible = false; flash(0.12); showToast("🚀 +1");
            } else {
              speed *= 0.3; spinTimer = 0.8; flash(0.5);
              it.alive = false; it.mesh.visible = false;
            }
          }
          if (it.alive && it.type !== "obstacle") it.mesh.rotation.y += dt * 3.0;
        }
      }

      updateRivals(dt);
      updateMissiles(dt);
      updateEffects(dt);

      if (!playerFinished && distanceTotal >= RACE_LAPS * trackLen) {
        playerFinished = true; playerRank = ++finishCount;
        finishRace();
        return;
      }

      _camPos.copy(_center).addScaledVector(_tan, -CAM_BACK).addScaledVector(_side, lateral * 0.4);
      _camPos.y += CAM_UP;
      camera.position.lerp(_camPos, 1 - Math.pow(0.0016, dt));
      _look.copy(_center).addScaledVector(_tan, CAM_LOOK);
      _look.y += 3.2;
      camera.lookAt(_look);

      sun.position.copy(_center).addScaledVector(sunDir, 600);
      sun.target.position.copy(_center); sun.target.updateMatrixWorld();

      if (flashEl.style.opacity > 0) flash(Math.max(0, parseFloat(flashEl.style.opacity) - dt * 1.6));

      updateHud();
      renderer.render(scene, camera);
      drawWheel(steering, gripping && spinTimer <= 0);
      drawPip(hands);

      requestAnimationFrame(loop);
    }

    // ---- ステアリングホイール描画 ----
    function drawWheel(steer, active) {
      const s = wheelCv.width; wctx.clearRect(0, 0, s, s);
      const cx = s / 2, cy = s / 2, r = s * 0.38;
      wctx.save();
      wctx.globalAlpha = active ? 0.95 : 0.4;
      wctx.translate(cx, cy); wctx.rotate(steer * 2.3);
      wctx.strokeStyle = active ? "#38f9d7" : "#fff";
      wctx.lineWidth = r * 0.16; wctx.lineCap = "round";
      wctx.beginPath(); wctx.arc(0, 0, r, 0, Math.PI * 2); wctx.stroke();
      for (const a of [Math.PI / 2, Math.PI / 2 + 2.094, Math.PI / 2 - 2.094]) {
        wctx.beginPath(); wctx.moveTo(0, 0); wctx.lineTo(Math.cos(a) * r, Math.sin(a) * r); wctx.stroke();
      }
      wctx.beginPath(); wctx.arc(0, 0, r * 0.2, 0, Math.PI * 2);
      wctx.fillStyle = active ? "#38f9d7" : "#fff"; wctx.fill();
      wctx.restore();
    }

    // ---- カメラPIP（自分の手）----
    function drawPip(hands) {
      const pw = pip.width, ph = pip.height;
      pctx.save();
      pctx.clearRect(0, 0, pw, ph);
      pctx.beginPath();
      if (pctx.roundRect) pctx.roundRect(0, 0, pw, ph, 12); else pctx.rect(0, 0, pw, ph);
      pctx.clip();
      pctx.translate(pw, 0); pctx.scale(-1, 1);
      pctx.drawImage(video, 0, 0, pw, ph);
      pctx.restore();
      pctx.strokeStyle = "rgba(255,255,255,.45)"; pctx.lineWidth = 2;
      pctx.beginPath();
      if (pctx.roundRect) pctx.roundRect(1, 1, pw - 2, ph - 2, 12); else pctx.rect(1, 1, pw - 2, ph - 2);
      pctx.stroke();
      const pts = hands.slice(0, 2).map((h) => ({ x: h.x * pw, y: h.y * ph, fist: h.fist }));
      if (pts.length === 2) {
        pctx.strokeStyle = "#38f9d7"; pctx.lineWidth = 3;
        pctx.beginPath(); pctx.moveTo(pts[0].x, pts[0].y); pctx.lineTo(pts[1].x, pts[1].y); pctx.stroke();
      }
      for (const p of pts) {
        pctx.beginPath(); pctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
        pctx.fillStyle = p.fist ? "#ff4d6d" : "#ffd166"; pctx.fill();
      }
    }
  </script>
