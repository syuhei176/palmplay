<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hand Racer — 両手ハンドルのwebカメラレース</title>
  <style>
    :root { --bg: #0b0d1a; --accent: #38f9d7; --danger: #ff4d6d; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: radial-gradient(circle at 50% 0%, #1a1f3a 0%, var(--bg) 70%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      overflow: hidden; -webkit-user-select: none; user-select: none;
    }
    #stage { position: relative; width: 100vw; height: 100vh; }
    #cam { display: none; }
    #game { width: 100%; height: 100%; object-fit: cover; display: block; }

    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 18px 24px; pointer-events: none; font-variant-numeric: tabular-nums;
    }
    #score { font-size: 32px; font-weight: 800; text-shadow: 0 2px 12px rgba(0,0,0,.7); }
    #score small { font-size: 13px; font-weight: 600; opacity: .7; display: block; letter-spacing: .15em; }
    #speed { font-size: 32px; font-weight: 800; text-align: right; text-shadow: 0 2px 12px rgba(0,0,0,.7); }
    #speed small { font-size: 13px; font-weight: 600; opacity: .7; display: block; letter-spacing: .15em; }
    #timer {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      font-size: 40px; font-weight: 800; font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
    }
    #timer.low { color: var(--danger); animation: pulse .5s ease-in-out infinite; }
    @keyframes pulse { 50% { transform: translateX(-50%) scale(1.18); } }

    #overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 22px;
      background: rgba(8,10,22,.82); backdrop-filter: blur(6px); text-align: center; padding: 24px;
    }
    #overlay.hidden { display: none; }
    #overlay h1 {
      font-size: clamp(40px, 8vw, 84px); font-weight: 900; letter-spacing: .02em;
      background: linear-gradient(120deg, var(--accent), #ffd166);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    #overlay p { font-size: 17px; line-height: 1.8; opacity: .85; max-width: 460px; }
    #overlay .big { font-size: 64px; font-weight: 900; }
    .btn {
      pointer-events: auto; cursor: pointer; border: none; font: inherit; font-weight: 800; font-size: 22px;
      color: #07140f; background: linear-gradient(120deg, var(--accent), #ffd166);
      padding: 16px 44px; border-radius: 999px; box-shadow: 0 8px 30px rgba(56,249,215,.35);
      transition: transform .12s, box-shadow .12s;
    }
    .btn:hover { transform: translateY(-2px); }
    .spinner {
      width: 46px; height: 46px; border: 4px solid rgba(255,255,255,.2);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #err { color: var(--danger); font-size: 15px; max-width: 460px; line-height: 1.7; }
    .hint { font-size: 13px; opacity: .55; letter-spacing: .04em; }
  </style>
</head>
<body>
  <div id="stage">
    <video id="cam" playsinline autoplay muted></video>
    <canvas id="game"></canvas>

    <div id="hud">
      <div id="score">0<small>SCORE</small></div>
      <div id="timer">60</div>
      <div id="speed">0<small>KM/H</small></div>
    </div>

    <div id="overlay">
      <h1>HAND&nbsp;RACER</h1>
      <p><strong>両手でハンドルを握って回す</strong>とコーナーを曲がれる。<br>
         坂道とカーブが続く立体コースを走り抜けよう。<br>
         🪙 を集めてスコアUP、🚧🚗 にぶつかると減速。<br>
         アクセルは自動。60秒でどこまで走れる？</p>
      <button class="btn" id="startBtn">スタート</button>
      <div class="hint">※ カメラの使用許可を求められたら「許可」を選んでください</div>
      <div id="err"></div>
    </div>
  </div>

  <script type="module">
    import {
      HandLandmarker,
      FilesetResolver,
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12";

    const video = document.getElementById("cam");
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const scoreEl = document.getElementById("score");
    const speedEl = document.getElementById("speed");
    const timerEl = document.getElementById("timer");

    // ---- 擬似3D道路パラメータ ----
    const SEG_LEN = 200;       // 1セグメントの奥行き
    const ROAD_WIDTH = 2000;   // 道路の半幅（ワールド単位）
    const CAM_HEIGHT = 1200;   // カメラの高さ
    const CAM_DEPTH = 0.84;    // 視野（1/tan(fov/2)）
    const DRAW_DIST = 160;     // 描画するセグメント数
    const TOTAL_SEG = 900;

    // ---- ゲームパラメータ ----
    const GAME_TIME = 60;
    const MAX_SPEED = 9000;
    const ACCEL = MAX_SPEED * 0.5;
    const MAX_WHEEL_ANGLE = 0.6; // この角度で最大舵角
    const STEER_RATE = 2.2;      // 舵による横移動量/秒
    const CENTRIFUGAL = 0.2;     // カーブで外側に流される強さ
    const OBSTACLES = ["🚧", "🚗", "🛢️", "🚙"];
    const SCENERY = ["🌲", "🌳", "🌲", "🌴", "🏠", "🪧"]; // 沿道の景観（当たり判定なし）

    let handLandmarker = null;
    let state = "idle";
    let W = 1280, H = 720, W2 = 640, H2 = 360;

    let segments = [];
    let trackLength = 0;
    let position = 0, playerX = 0, speed = 0, distance = 0;
    let steering = 0, gripping = false;
    let coins = 0, shake = 0, flashAlpha = 0;
    let lastSeg = -1;
    let timeLeft = GAME_TIME, lastSec = -1, elapsed = 0;
    let lastTime = 0, lastVideoTime = -1, spin = 0;
    let lastHands = [];
    let particles = [];

    async function loadModel() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm"
      );
      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU",
        },
        runningMode: "VIDEO",
        numHands: 2,
      });
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();
      canvas.width = W = video.videoWidth || 1280;
      canvas.height = H = video.videoHeight || 720;
      W2 = W / 2; H2 = H / 2;
    }

    // ---- コース生成（左右カーブ＋高低差のある立体コース）----
    function buildTrack() {
      segments = [];
      let elevation = 0;
      while (segments.length < TOTAL_SEG) {
        const len = 16 + (Math.random() * 50 | 0);
        const straight = Math.random() < 0.26;
        const curve = straight ? 0 : (Math.random() * 2 - 1) * 3.8;
        const flat = Math.random() < 0.3;
        // 標高は0付近へ緩やかに戻す（コースが空へ飛んでいかないように）
        const hillBias = -elevation * 0.35;
        const hill = flat ? hillBias : hillBias + (Math.random() * 2 - 1) * 1600;
        const startY = elevation;
        for (let k = 0; k < len && segments.length < TOTAL_SEG; k++) {
          // カーブの入口/出口をなめらかに
          const ease = Math.sin(Math.min(1, k / 12) * Math.PI / 2);
          // 坂の登り降りもなめらかなS字に
          const yEase = (1 - Math.cos(((k + 1) / len) * Math.PI)) / 2;
          segments.push({
            index: segments.length,
            curve: curve * ease,
            y: startY + hill * yEase,
            sprites: [],
          });
        }
        elevation = startY + hill;
      }
      trackLength = segments.length * SEG_LEN;

      // ループの継ぎ目で標高が飛ばないよう、全体の傾きを取り除く
      const N = segments.length;
      const endY = segments[N - 1].y;
      for (let i = 0; i < N; i++) segments[i].y -= endY * (i / N);

      // 障害物・コイン・沿道の景観を配置
      for (let i = 40; i < segments.length; i++) {
        const r = Math.random();
        if (r < 0.05) {
          segments[i].sprites.push({
            offset: Math.random() * 1.6 - 0.8,
            type: "obstacle",
            emoji: OBSTACLES[(Math.random() * OBSTACLES.length) | 0],
          });
        } else if (r < 0.14) {
          segments[i].sprites.push({ offset: Math.random() * 1.4 - 0.7, type: "coin", emoji: "🪙" });
        }
        // 沿道の木や標識（コース外＝当たり判定なし、奥行きの目印）
        if (Math.random() < 0.5) {
          const side = Math.random() < 0.5 ? -1 : 1;
          segments[i].sprites.push({
            offset: side * (1.5 + Math.random() * 1.4),
            type: "scenery",
            emoji: SCENERY[(Math.random() * SCENERY.length) | 0],
          });
        }
      }
    }

    startBtn.addEventListener("click", async () => {
      overlay.innerHTML = '<div class="spinner"></div><p>カメラとAIモデルを準備中…</p>';
      try {
        await startCamera();
        if (!handLandmarker) await loadModel();
        buildTrack();
        resetGame();
        overlay.classList.add("hidden");
        state = "playing";
        lastTime = performance.now();
        requestAnimationFrame(loop);
      } catch (e) {
        console.error(e);
        showError(e);
      }
    });

    function showError(e) {
      overlay.classList.remove("hidden");
      const msg =
        e?.name === "NotAllowedError"
          ? "カメラの使用が許可されませんでした。ブラウザのカメラ設定から許可してください。"
          : "起動に失敗しました（" + (e?.message || e) + "）。https もしくは localhost で開いているか確認してください。";
      overlay.innerHTML =
        '<h1>HAND&nbsp;RACER</h1><div id="err"></div><button class="btn" id="retry">もう一度</button>';
      overlay.querySelector("#err").textContent = msg;
      overlay.querySelector("#retry").addEventListener("click", () => location.reload());
    }

    function resetGame() {
      position = 0; playerX = 0; speed = 0; distance = 0;
      steering = 0; coins = 0; shake = 0; flashAlpha = 0; lastSeg = -1;
      timeLeft = GAME_TIME; lastSec = -1; elapsed = 0; particles = [];
      updateHud(); updateTimer();
    }

    function score() { return Math.floor(distance / 50) + coins * 100; }
    function updateHud() {
      scoreEl.innerHTML = score() + "<small>SCORE</small>";
      speedEl.innerHTML = Math.floor((speed / MAX_SPEED) * 220) + "<small>KM/H</small>";
    }
    function updateTimer() {
      const s = Math.max(0, Math.ceil(timeLeft));
      if (s !== lastSec) { lastSec = s; timerEl.textContent = s; timerEl.classList.toggle("low", s <= 10); }
    }

    function gameOver(title) {
      state = "over";
      overlay.classList.remove("hidden");
      overlay.innerHTML =
        "<h1>" + title + '</h1><p>SCORE</p><div class="big">' + score() +
        "</div><p>🪙 × " + coins + '</p><button class="btn" id="again">もう一度</button>';
      overlay.querySelector("#again").addEventListener("click", () => {
        buildTrack(); resetGame();
        overlay.classList.add("hidden");
        state = "playing"; lastTime = performance.now();
        requestAnimationFrame(loop);
      });
    }

    function splat(x, y, color, n = 12) {
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2, s = 80 + Math.random() * 240;
        particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60,
          life: 0.5 + Math.random() * 0.3, age: 0, color, size: 3 + Math.random() * 6 });
      }
    }

    // ---- 手検出（手のひら中心＝中指付け根 landmark 9）----
    function detectHands(nowMs) {
      if (video.currentTime === lastVideoTime) return lastHands;
      lastVideoTime = video.currentTime;
      const out = [];
      const res = handLandmarker.detectForVideo(video, nowMs);
      if (res?.landmarks) {
        for (const lm of res.landmarks) {
          const c = lm[9];
          out.push({ x: canvas.width - c.x * canvas.width, y: c.y * canvas.height });
        }
      }
      lastHands = out;
      return out;
    }

    // ---- 道路の投影（高さ込みの擬似3D）----
    function proj(worldX, worldY, dz, cameraX, cameraY) {
      if (dz < 1) dz = 1;
      const scale = CAM_DEPTH / dz;
      return {
        scale,
        sx: W2 + scale * (worldX - cameraX) * W2,
        sy: H2 - scale * (worldY - cameraY) * H2,
        sw: scale * ROAD_WIDTH * W2,
      };
    }

    // 遠くのセグメントを空の色へ溶かす（霞んで奥行きが出る）
    function shade(hex, fog) {
      if (!fog) return hex;
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      const m = (c, h) => Math.round(c + (h - c) * fog);
      return `rgb(${m(r, 120)},${m(g, 150)},${m(b, 195)})`;
    }

    // ---- メインループ ----
    function loop(now) {
      if (state !== "playing") return;
      const dt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now; elapsed += dt; spin += dt;

      timeLeft -= dt;
      updateTimer();
      if (timeLeft <= 0) { gameOver("FINISH!"); return; }

      // 1) ステアリング（両手の傾き）
      const hands = detectHands(now);
      gripping = hands.length >= 2;
      if (gripping) {
        const hs = hands.slice(0, 2).sort((a, b) => a.x - b.x);
        const L = hs[0], R = hs[1];
        const ang = Math.atan2(R.y - L.y, R.x - L.x);
        const target = Math.max(-1, Math.min(1, ang / MAX_WHEEL_ANGLE));
        steering += (target - steering) * Math.min(1, dt * 12);
      } else {
        steering *= 1 - Math.min(1, dt * 3); // ハンドルを離すとセンターへ
      }

      // 2) 速度
      const base = Math.floor(position / SEG_LEN) % segments.length;
      const offRoad = Math.abs(playerX) > 1;
      speed += ACCEL * dt;
      if (speed > MAX_SPEED) speed = MAX_SPEED;
      if (offRoad && speed > MAX_SPEED * 0.4) { speed -= ACCEL * 2 * dt; shake = Math.max(shake, 6); }

      // 3) 前進
      position = (position + speed * dt) % trackLength;
      distance += speed * dt;

      // 4) 横移動：舵 + 遠心力
      const sf = speed / MAX_SPEED;
      playerX += steering * STEER_RATE * dt * (0.35 + 0.65 * sf);
      playerX -= segments[base].curve * CENTRIFUGAL * sf * dt;
      playerX = Math.max(-2.2, Math.min(2.2, playerX));

      // 5) 当たり判定（セグメントをまたいだ瞬間に判定）
      if (base !== lastSeg) {
        lastSeg = base;
        for (const sp of segments[base].sprites) {
          if (sp.type === "scenery") continue; // 沿道の景観は当たらない
          if (Math.abs(playerX - sp.offset) < 0.45) {
            if (sp.type === "coin") { coins++; flashAlpha = Math.max(flashAlpha, 0.2); }
            else { speed *= 0.25; shake = 16; flashAlpha = 0.5; }
          }
        }
      }

      for (const p of particles) { p.age += dt; p.vy += 600 * dt; p.x += p.vx * dt; p.y += p.vy * dt; }
      particles = particles.filter((p) => p.age < p.life);
      if (shake > 0) shake = Math.max(0, shake - dt * 30);
      if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - dt * 1.5);

      updateHud();
      render(hands);
      requestAnimationFrame(loop);
    }

    // ---- 描画 ----
    function render(hands) {
      ctx.save();
      if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

      // 空
      const sky = ctx.createLinearGradient(0, 0, 0, H2 + 40);
      sky.addColorStop(0, "#1a2a55"); sky.addColorStop(1, "#4a6aa5");
      ctx.fillStyle = sky; ctx.fillRect(-20, -20, W + 40, H2 + 60);
      // 地面ベース
      ctx.fillStyle = "#0c2a15"; ctx.fillRect(-20, H2, W + 40, H2 + 40);

      // 道路セグメント（手前→奥、maxyで奥の重なりを省く）
      const base = Math.floor(position / SEG_LEN) % segments.length;
      const cameraX = playerX * ROAD_WIDTH;
      // カメラの高さは足元の路面標高に追従（坂で視点が上下する）
      const segFrac = (position % SEG_LEN) / SEG_LEN;
      const baseY = segments[base].y;
      const playerY = baseY + (segments[(base + 1) % segments.length].y - baseY) * segFrac;
      const cameraY = playerY + CAM_HEIGHT;

      let x = 0, dx = 0, maxy = H;
      const drawn = [];
      for (let n = 0; n < DRAW_DIST; n++) {
        const idx = (base + n) % segments.length;
        const seg = segments[idx];
        const nextIdx = (idx + 1) % segments.length;
        let worldZ = idx * SEG_LEN;
        if (idx < base) worldZ += trackLength; // ループで前方に回り込んだ分
        const dz1 = worldZ - position;
        const dz2 = dz1 + SEG_LEN;
        const p1 = proj(x, seg.y, dz1, cameraX, cameraY);
        const p2 = proj(x + dx, segments[nextIdx].y, dz2, cameraX, cameraY);
        x += dx; dx += seg.curve;
        // maxy より下（手前の路面や丘の陰）になるセグメントは描かない
        if (dz1 <= 0 || p2.sy >= maxy) continue;
        const fog = Math.min(1, Math.pow(n / DRAW_DIST, 1.6) * 1.1);
        drawSegment(idx, p1, p2, fog);
        maxy = p2.sy;
        seg._p1 = p1;
        drawn.push(seg);
      }

      // スプライト（奥→手前で重ね順を正しく）
      for (let i = drawn.length - 1; i >= 0; i--) {
        const seg = drawn[i];
        const p = seg._p1;
        for (const sp of seg.sprites) {
          const sx = p.sx + sp.offset * p.sw;
          // コインは小さく＆少し浮かせて見通しを確保。景観は大きめ。
          let factor = 0.5, cap = H * 0.45, lift = 0;
          if (sp.type === "coin") { factor = 0.24; cap = H * 0.16; lift = p.sw * 0.18; }
          else if (sp.type === "scenery") { factor = 0.7; cap = H * 0.55; }
          const size = Math.max(6, Math.min(cap, p.sw * factor));
          ctx.font = size + "px serif";
          ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
          ctx.fillText(sp.emoji, sx, p.sy - lift);
        }
      }

      // 自車
      const carX = W2 + steering * 30;
      const carSize = H * 0.18;
      ctx.font = carSize + "px serif";
      ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
      ctx.save();
      ctx.translate(carX, H - 24 + Math.sin(spin * 20) * 2);
      ctx.rotate(steering * 0.12);
      ctx.fillText("🏎️", 0, 0);
      ctx.restore();

      // パーティクル
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, 1 - p.age / p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.restore(); // shake

      // 被弾フラッシュ
      if (flashAlpha > 0) {
        ctx.fillStyle = `rgba(255,77,109,${flashAlpha})`;
        ctx.fillRect(0, 0, W, H);
      }

      // ハンドルインジケーター（中央下）
      drawWheel(W2, H - carSize * 0.5, Math.min(W, H) * 0.11, steering * 2.3, gripping);
      if (!gripping) {
        ctx.fillStyle = "rgba(255,255,255,.92)";
        ctx.font = "bold " + Math.round(H * 0.04) + "px sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("✋ 両手でハンドルを握って！ ✋", W2, H2);
      }

      // カメラ PIP（自分の手が見える）
      drawPip(hands);
    }

    function drawSegment(idx, p1, p2, fog) {
      const dark = Math.floor(idx / 3) % 2;
      const grass = shade(dark ? "#0e3a1d" : "#0b3018", fog);
      const road = shade(dark ? "#3a424c" : "#454e59", fog);
      const rumble = shade(dark ? "#e8e8e8" : "#cc2b2b", fog);
      const { sx: x1, sw: w1, sy: y1 } = p1;
      const { sx: x2, sw: w2, sy: y2 } = p2;
      // 草
      ctx.fillStyle = grass; ctx.fillRect(0, y2, W, (y1 - y2) + 1);
      // 縁石
      poly(x1 - w1 * 1.18, y1, x1 - w1, y1, x2 - w2, y2, x2 - w2 * 1.18, y2, rumble);
      poly(x1 + w1, y1, x1 + w1 * 1.18, y1, x2 + w2 * 1.18, y2, x2 + w2, y2, rumble);
      // 路面
      poly(x1 - w1, y1, x1 + w1, y1, x2 + w2, y2, x2 - w2, y2, road);
      // センターライン
      if (dark) poly(x1 - w1 * 0.04, y1, x1 + w1 * 0.04, y1, x2 + w2 * 0.04, y2, x2 - w2 * 0.04, y2, shade("#f0f0f0", fog));
    }

    function poly(x1, y1, x2, y2, x3, y3, x4, y4, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3); ctx.lineTo(x4, y4);
      ctx.closePath(); ctx.fill();
    }

    function drawWheel(cx, cy, r, angle, active) {
      ctx.save();
      ctx.globalAlpha = active ? 0.95 : 0.4;
      ctx.translate(cx, cy); ctx.rotate(angle);
      ctx.strokeStyle = active ? "#38f9d7" : "#fff";
      ctx.lineWidth = r * 0.16; ctx.lineCap = "round";
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
      // スポーク
      for (const a of [Math.PI / 2, Math.PI / 2 + 2.094, Math.PI / 2 - 2.094]) {
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r); ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(0, 0, r * 0.2, 0, Math.PI * 2);
      ctx.fillStyle = active ? "#38f9d7" : "#fff"; ctx.fill();
      ctx.restore();
    }

    function drawPip(hands) {
      const pw = Math.round(W * 0.2), ph = Math.round(pw * 9 / 16);
      const px = W - pw - 16, py = 70;
      ctx.save();
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(px, py, pw, ph, 12); else ctx.rect(px, py, pw, ph);
      ctx.clip();
      ctx.translate(px + pw, py); ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, pw, ph);
      ctx.restore();
      // 枠
      ctx.strokeStyle = "rgba(255,255,255,.4)"; ctx.lineWidth = 2;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(px, py, pw, ph, 12); else ctx.rect(px, py, pw, ph);
      ctx.stroke();
      // 手の位置と、結ぶ線（ハンドルの傾き）
      const pts = hands.slice(0, 2).map((h) => ({ x: px + (h.x / W) * pw, y: py + (h.y / H) * ph }));
      if (pts.length === 2) {
        ctx.strokeStyle = "#38f9d7"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); ctx.lineTo(pts[1].x, pts[1].y); ctx.stroke();
      }
      for (const p of pts) {
        ctx.beginPath(); ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
        ctx.fillStyle = "#ffd166"; ctx.fill();
      }
    }
  </script>
